name: Update water quality data

on:
  schedule:
    # Thursday 09:00 UTC (05:00 Ottawa) -- a day after the City posts its
    # Wednesday results and Riverkeeper's weekly volunteer sampling lands.
    - cron: "0 9 * * 4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/fetch_water_quality.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/water_quality.csv; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/water_quality.csv
          git commit -m "Update water quality data"
          git push
